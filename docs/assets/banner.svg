<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="amber" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d4a853;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e8bb6a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4a853;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="fade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6b6660;stop-opacity:0" />
      <stop offset="15%" style="stop-color:#6b6660;stop-opacity:0.4" />
      <stop offset="85%" style="stop-color:#6b6660;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#6b6660;stop-opacity:0" />
    </linearGradient>
  </defs>
  <rect width="800" height="200" fill="#0a0a0a" rx="12"/>
  <!-- Subtle border -->
  <rect x="0.5" y="0.5" width="799" height="199" fill="none" stroke="#1e1e1e" rx="12" stroke-width="1"/>
  <!-- Accent line top -->
  <rect x="200" y="0" width="400" height="2" fill="url(#amber)" opacity="0.6"/>
  <!-- Main text -->
  <text x="400" y="85" text-anchor="middle" font-family="'SF Mono','Cascadia Code','Fira Code',Consolas,monospace" font-size="52" font-weight="700" fill="url(#amber)" letter-spacing="6">SECURE</text>
  <text x="400" y="130" text-anchor="middle" font-family="'SF Mono','Cascadia Code','Fira Code',Consolas,monospace" font-size="28" font-weight="400" fill="#6b6660" letter-spacing="16">AI · APP</text>
  <!-- Divider -->
  <line x1="200" y1="150" x2="600" y2="150" stroke="url(#fade)" stroke-width="1"/>
  <!-- Tagline -->
  <text x="400" y="175" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" fill="#6b6660" letter-spacing="3">SECURITY GUARDRAILS FOR AI-GENERATED CODE</text>
  <!-- Accent line bottom -->
  <rect x="200" y="198" width="400" height="2" fill="url(#amber)" opacity="0.3"/>
</svg>
